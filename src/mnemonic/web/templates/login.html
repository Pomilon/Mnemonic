<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemonic - Admin Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 min-h-screen flex items-center justify-center selection:bg-cyan-500/30">
    
    <div class="w-full max-w-md p-8 bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl">
        <div class="flex flex-col items-center mb-8">
            <div class="p-4 bg-cyan-500/10 rounded-2xl text-cyan-400 mb-4">
                <i data-lucide="shield-lock" size="32"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-100 tracking-tight text-center">Admin Access</h1>
            <p class="text-slate-500 text-sm mt-2 text-center">Provide system token to enter terminal.</p>
        </div>

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 px-1">Access Token</label>
                <input 
                    type="password" 
                    name="token" 
                    placeholder="••••••••••••••••"
                    required
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3.5 px-5 text-slate-100 placeholder-slate-800 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/20 transition-all shadow-inner"
                >
            </div>

            {% if error %}
            <div class="p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl flex items-center gap-3 animate-in fade-in slide-in-from-top-2 duration-300">
                <i data-lucide="alert-circle" size="18" class="text-rose-500"></i>
                <span class="text-xs font-bold text-rose-500 uppercase tracking-tight">Invalid Authorization Token</span>
            </div>
            {% endif %}

            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg shadow-cyan-500/10">
                Authenticate
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800/50 flex justify-center">
            <a href="/" class="text-xs font-bold text-slate-600 hover:text-slate-400 transition-colors uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="arrow-left" size="14"></i>
                Return to Search
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
