services:
  mnemonic:
    build: .
    container_name: mnemonic
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      # Optionally mount .env or config.json if you want to override defaults
      # - ./.env:/app/.env
      # - ./config.json:/app/config.json
    environment:
      - MNEMONIC_ADMIN_TOKEN=${MNEMONIC_ADMIN_TOKEN:-admin-default-secret-change-me}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

networks:
  default:
    name: mnemonic_network
